<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>egminy</title>
    <!-- Pretendard 폰트 불러오기 -->
    <link rel="stylesheet" as="style" crossorigin href="https://jsdelivr.net" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            text-align: center;
        }
        .link-text {
            font-size: 1.2rem;
            font-weight: 400; /* 기존 300에서 400으로 변경하여 가독성을 높였습니다 */
            color: #1d1d1f;
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
        }
        .link-text:active, .link-text:hover {
            color: #86868b;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- href="#" 자리에 나중에 이동할 링크를 넣으시면 됩니다 -->
        <a href="#" class="link-text">Buy</a>
        <a href="#" class="link-text">Contact</a>
    </div>

</body>
</html>
