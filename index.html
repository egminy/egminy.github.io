
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>egminy</title>
    <style>
        /* 기본 여백 및 배경 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 중앙 텍스트 정렬 */
        .container {
            display: flex;
            flex-direction: column;
            gap: 40px; /* 글자 사이의 넓은 여백 */
            text-align: center;
        }
        /* 링크 텍스트 스타일 (네모 테두리 없음) */
        .link-text {
            font-size: 1.2rem;
            font-weight: 300; /* 얇은 폰트로 세련되게 */
            color: #1d1d1f; /* 애플 특유의 부드러운 블랙 */
            text-decoration: none; /* 밑줄 제거 */
            letter-spacing: 0.05em; /* 자간을 넓혀 고급스럽게 */
            transition: color 0.3s ease;
        }
        /* 터치하거나 마우스를 올렸을 때 은은하게 흐려지는 효과 */
        .link-text:active, .link-text:hover {
            color: #86868b;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- href="#" 자리에 나중에 이동할 링크를 넣으시면 됩니다 -->
        <a href="#" class="link-text">Buy</a>
        <a href="#" class="link-text">Contact</a>
    </div>

</body>
</html>
